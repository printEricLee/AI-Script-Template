<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Architect PRO | Bilingual AI Framework</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icon/favicon.png" type="image/x-icon">
</head>

<body>

    <div class="bg-mesh"></div>

    <!-- Language Toggle -->
    <div class="fixed top-8 right-8 z-[100] flex p-1 glass-card rounded-full border border-white/10 shadow-2xl">
        <button onclick="changeLanguage('zh')" id="langZh"
            class="px-5 py-2 rounded-full text-[10px] font-black tracking-widest transition-all">繁體中文</button>
        <button onclick="changeLanguage('en')" id="langEn"
            class="px-5 py-2 rounded-full text-[10px] font-black tracking-widest transition-all">ENGLISH</button>
    </div>

    <!-- HERO - Full Page -->
    <section id="heroSection" class="page min-h-screen flex flex-col items-center justify-center px-6">
        <div class="max-w-4xl w-full text-center">
            <div class="mb-8 inline-flex items-center space-x-3 px-5 py-2 rounded-full border border-sky-500/30 bg-sky-500/10 text-sky-400 text-[11px] font-black tracking-[0.3em] uppercase"
                data-i18n="landingBadge">
                Advanced Prompt Engineering Studio
            </div>
            <h1 class="text-7xl md:text-8xl font-black tracking-tighter mb-10 leading-[1] text-white">
                <span data-i18n="landingTitle1">架構您的</span> <br />
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-300 via-indigo-200 to-indigo-500"
                    data-i18n="landingTitle2">AI 指令集。</span>
            </h1>
            <p class="text-slate-400 text-lg md:text-xl font-light mb-16 max-w-3xl mx-auto leading-relaxed"
                data-i18n="landingDesc"></p>
            <button onclick="scrollToTemplates()"
                class="btn-primary py-6 px-16 rounded-full text-sm uppercase tracking-[0.25em] flex items-center mx-auto group">
                <span data-i18n="btnInit">進入工作區</span>
                <i class="fas fa-arrow-down ml-4 group-hover:translate-y-1 transition-transform"></i>
            </button>
        </div>
    </section>

    <!-- Template Section -->
    <section id="templateSection" class="page min-h-screen flex flex-col items-center px-6 py-20">
        <div class="max-w-[1400px] w-full px-4">
            <div class="text-center mb-12">
                <h2 class="text-4xl md:text-5xl font-black tracking-tight text-white mb-4" data-i18n="sidebarLibrary">
                    腳本庫</h2>
                <div class="w-20 h-1 bg-gradient-to-r from-sky-400 to-indigo-500 mx-auto rounded-full"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Left: Template List -->
                <aside class="lg:col-span-3">
                    <div class="glass-card p-6">
                        <h3
                            class="text-[11px] font-black text-sky-500 uppercase tracking-[0.2em] mb-6 flex items-center">
                            <i class="fas fa-swatchbook mr-3"></i> <span data-i18n="sidebarLibrary">腳本庫</span>
                        </h3>
                        <div id="homeTemplateList" class="space-y-3 overflow-y-auto max-h-[520px] pr-2"></div>
                    </div>
                </aside>

                <!-- Center: Template Editor -->
                <div class="lg:col-span-5">
                    <div class="glass-card p-6 h-full flex flex-col min-h-[600px]">
                        <h3
                            class="text-[11px] font-black text-sky-500 uppercase tracking-[0.2em] mb-4 flex items-center">
                            <i class="fas fa-pen-to-square mr-3"></i> <span data-i18n="editorLabel">模板編輯器</span>
                        </h3>
                        <textarea id="promptEditor"
                            class="flex-grow text-[13px] text-slate-300 whitespace-pre-wrap code-font bg-black/40 p-6 rounded-2xl border border-white/5 leading-relaxed resize-none focus:outline-none focus:border-sky-500/40 transition-colors"
                            data-i18n-placeholder="editorPlaceholder"
                            placeholder="// 請從左側庫選擇一個模板，或在此開始輸入帶有 [變數] 的架構..."></textarea>
                    </div>
                </div>

                <!-- Right: Variable Inputs -->
                <div class="lg:col-span-4">
                    <div class="glass-card p-6 h-full flex flex-col min-h-[600px]">
                        <h3
                            class="text-[11px] font-black text-sky-500 uppercase tracking-[0.2em] mb-4 flex items-center">
                            <i class="fas fa-sliders mr-3"></i> <span data-i18n="varsLabel">參數設定</span>
                        </h3>

                        <!-- Core inputs -->
                        <div class="space-y-4 mb-6">
                            <div>
                                <label class="block text-[8px] text-slate-500 font-black mb-2 uppercase tracking-widest"
                                    data-i18n="labelTitle">項目主旨</label>
                                <input type="text" id="appTitle"
                                    class="input-tech w-full px-4 py-3 text-[11px] font-bold" placeholder="My App">
                            </div>
                            <div>
                                <label class="block text-[8px] text-slate-500 font-black mb-2 uppercase tracking-widest"
                                    data-i18n="labelStack">技術棧 / 運行環境</label>
                                <input type="text" id="appTech"
                                    class="input-tech w-full px-4 py-3 text-[11px] font-bold"
                                    placeholder="React + Node.js">
                            </div>
                        </div>

                        <!-- Dynamic variable inputs -->
                        <div id="varPanel" class="hidden mb-6">
                            <div class="flex items-center mb-4">
                                <span id="varCountBadge"
                                    class="text-[9px] font-black text-sky-400 bg-sky-500/10 px-3 py-1 rounded-full border border-sky-500/20"
                                    data-i18n="badgeVars">動態參數已提取</span>
                            </div>
                            <div id="dynamicInputs" class="space-y-4 overflow-y-auto max-h-[280px] pr-2"></div>
                        </div>

                        <!-- Compile & Copy -->
                        <div class="mt-auto space-y-4">
                            <button onclick="compileAndShow(); document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth' });"
                                class="btn-primary w-full py-4 rounded-xl text-[11px] uppercase tracking-[0.2em] font-black flex items-center justify-center group">
                                <i class="fas fa-gear mr-3"></i>
                                <span data-i18n="btnCompile">編譯指令</span>
                            </button>
                            <button onclick="copyOutput()"
                                class="w-full py-4 rounded-xl text-[11px] uppercase tracking-[0.2em] font-black flex items-center justify-center border border-white/10 text-slate-400 hover:text-white hover:border-sky-500/40 transition-all">
                                <i class="fas fa-copy mr-3"></i>
                                <span data-i18n="btnCopy">複製腳本</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Compiled Output Section -->
            <div id="outputSection" class="mt-10 hidden">
                <div class="glass-card p-8">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-[11px] font-black text-sky-500 uppercase tracking-[0.2em] flex items-center">
                            <i class="fas fa-terminal mr-3"></i> <span data-i18n="outputTitle">最終編譯指令</span>
                        </h3>
                        <button onclick="copyOutput()"
                            class="px-5 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest border border-white/10 text-slate-400 hover:text-white hover:border-sky-500/40 transition-all">
                            <i class="fas fa-copy mr-2"></i> <span data-i18n="btnCopy">複製腳本</span>
                        </button>
                    </div>
                    <pre id="compiledOutput"
                        class="text-[13px] text-slate-300 whitespace-pre-wrap code-font bg-black/40 p-8 rounded-2xl border border-white/5 leading-relaxed overflow-y-auto max-h-[600px]"></pre>
                </div>
            </div>
        </div>
    </section>

    <!-- Toast -->
    <div id="toast"
        class="fixed bottom-12 left-1/2 -translate-x-1/2 glass-card bg-sky-500 text-black px-12 py-5 rounded-2xl shadow-2xl text-[11px] font-black uppercase tracking-[0.25em] opacity-0 pointer-events-none transition-all duration-500 z-[100]">
        <span data-i18n="toastCopy">腳本已存入剪貼簿</span>
    </div>

    <script src="i18n.js"></script>
    <script src="script.js"></script>
</body>

</html>
